server:
  port: 8080
spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    username: root
    password: 123456
    url: jdbc:mysql://localhost:3306/job_link
    driver-class-name: com.mysql.cj.jdbc.Driver
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
  data:
   redis:
    host: localhost
    port: 6379
    username: root
    password: 123456
mybatis-plus:
    mapper-locations: classpath:mapper/*.xml
    type-aliases-package: com.smartinterview.entity
    configuration:
      map-underscore-to-camel-case: true



